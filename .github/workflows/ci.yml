name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Build & test backend
        working-directory: backend
        run: |
          ./mvnw clean test -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps & lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
